# ==========================================================
# IDD BASELINE TRAINING CONFIGURATION
# ==========================================================

project:
  name: "Enhanced-YOLOv5s"
  experiment: "idd_baseline5"
  output_dir: "runs/train"

dataset:
  yaml: "datasets/idd/data.yaml"

model:
  config: "yolov5/models/yolov5s.yaml"
  weights: "weights/pretrained/yolov5s.pt"

training:
  epochs: 5
  batch_size: 4
  image_size: 640
  workers: 4
  device: "0"
  cache: false
  optimizer: SGD
  seed: 42

augmentation:

  # Default YOLOv5
  mosaic: 1.0
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flipud: 0.0
  fliplr: 0.5
  scale: 0.5
  translate: 0.1
  shear: 0.0
  perspective: 0.0

  # Paper augmentation
  #cutmix: false
  #cutmix_prob: 0.5

enhancements:

  anchor_refinement: false
  lwconv: false
  lwc3: false
  wise_iou: false
  p2_head: false
  afp: false
  attention4d: false

validation:
  save_best: true
  save_last: true
  conf_threshold: 0.25

logging:
  save_plots: true
  tensorboard: true